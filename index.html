<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okulumuz OS V24.8</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f3f4f6; --t: #1f2937; --card: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 20px; flex-direction: column; position: absolute; width: 100%; top:0; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; position: relative; }
        .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; background: var(--card); color: var(--t); }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); border-top: 1px solid #ddd; display: flex; z-index: 100; }
        .nav-item { flex: 1; text-align: center; opacity: 0.4; cursor: pointer; font-size: 11px; padding-top: 15px; }
        .nav-item.active { opacity: 1; color: var(--p); font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .badge { font-size: 10px; padding: 2px 6px; color: white; border-radius: 4px; font-weight: bold; }
        .admin-btn { position: fixed; top: 15px; right: 15px; background: #000; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 11px; z-index: 500; cursor: pointer; border:none; }
        .p-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--p); }
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:400px; background:white; padding:20px; border-radius:15px; box-shadow:0 0 50px rgba(0,0,0,0.3); z-index:4000; max-height: 85vh; overflow-y: auto; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:3999; }
        .chat-bubble { padding: 10px; border-radius: 10px; margin-bottom: 5px; max-width: 80%; }
        .me { background: var(--p); color: white; align-self: flex-end; margin-left: auto; }
        .them { background: #e5e7eb; color: #000; align-self: flex-start; }
        .update-banner { background: #dcfce7; color: #166534; padding: 10px; border-radius: 8px; border: 1px dashed #22c55e; font-size: 13px; }
    </style>
</head>
<body>

<button id="adm-gate" class="admin-btn" style="display:none;" onclick="tryAdmin()">👑 YÖNETİM</button>
<datalist id="sube-listesi"></datalist>

<div class="screen" id="scr-admin" style="z-index:3000;">
    <h3>👑 Yönetim Paneli</h3>
    <div class="scroll">
        <div class="card">
            <h4>👥 Kullanıcılar (Tıkla Yönet)</h4>
            <div id="adm-user-list"></div>
        </div>
        <div class="card">
            <h4>🏢 Okul Ekle / Sil</h4>
            <input type="text" id="adm-new-sch" placeholder="Okul Adı">
            <button class="btn" onclick="addSchool()">Ekle</button>
            <div id="adm-school-list"></div>
        </div>
        <div class="card">
            <h4>📚 Ödev Ver</h4>
            <select id="adm-hw-sch" onfocus="loadSchools('adm-hw-sch')"></select>
            <input type="text" id="adm-hw-sub" list="sube-listesi" placeholder="Şube">
            <textarea id="adm-hw-text" placeholder="Ödev/Duyuru..."></textarea>
            <button class="btn" onclick="addHw()">Yayınla</button>
        </div>
        <div class="card">
            <h4>🆙 Güncelleme Yayınla</h4>
            <input type="text" id="adm-up-ver" placeholder="Versiyon (Örn: V2.1)">
            <input type="text" id="adm-up-url" placeholder="İndirme Linki">
            <textarea id="adm-up-note" placeholder="Güncelleme Notları"></textarea>
            <button class="btn" style="background:#059669" onclick="pushUpdate()">Güncellemeyi Dağıt</button>
        </div>
        <button class="btn" style="background:#666" onclick="nav('scr-app')">Kapat</button>
    </div>
</div>

<div class="overlay" id="gui-overlay" onclick="closeModals()"></div>

<div id="user-gui" class="modal">
    <h3 id="gui-title">Yönetim</h3>
    <label>Unvan & Renk:</label>
    <input type="text" id="gui-rank">
    <input type="color" id="gui-color" style="height:40px;">
    <label>Yıldız:</label>
    <input type="number" id="gui-stars">
    <label>Okul & Şube:</label>
    <select id="gui-sch" onfocus="loadSchools('gui-sch')"></select>
    <input type="text" id="gui-sub" list="sube-listesi">
    <label>Ceza (Saat):</label>
    <input type="number" id="gui-ban-h" placeholder="0 = Yok">
    <button class="btn" onclick="saveGui('update')">Kaydet</button>
    <button class="btn" style="background:red" onclick="saveGui('ban')">Ceza Ver</button>
    <button class="btn" style="background:black" onclick="saveGui('delete')">Sil</button>
</div>

<div id="profile-gui" class="modal">
    <div style="text-align:center;">
        <img id="p-gui-img" class="p-img" src="">
        <h3 id="p-gui-name"></h3>
        <p id="p-gui-sch" style="color:var(--p); font-weight:bold;"></p>
        <p>👤 <span id="p-gui-followers">0</span> Takipçi</p>
        <button class="btn" style="background:#666" onclick="closeModals()">Kapat</button>
    </div>
</div>

<div class="screen" id="scr-lock">
    <div style="text-align:center; padding-top:50px;">
        <h2>🔐 E-Posta Doğrulama</h2>
        <p id="verify-info" style="font-size:12px; margin:10px;"></p>
        <input type="text" id="p-code" maxlength="4" placeholder="PIN" style="text-align:center; font-size:24px;">
        <button class="btn" onclick="verifyPin()">Onayla</button>
        <button class="btn" style="background:none; color:var(--p);" onclick="location.reload()">Geri Dön</button>
    </div>
</div>

<div class="screen active" id="scr-log">
    <div style="text-align:center; margin-top:80px;"><h1>Okulumuz OS</h1></div>
    <input type="text" id="login-u" placeholder="Kullanıcı Adı">
    <input type="password" id="login-p" placeholder="Şifre">
    <button class="btn" onclick="doLogin()">Giriş</button>
    <button class="btn" style="background:none; color:var(--p);" onclick="nav('scr-reg'); loadSchools('reg-sch');">Yeni Kayıt</button>
</div>

<div class="screen" id="scr-reg">
    <h3>Yeni Kayıt</h3>
    <input type="text" id="reg-u" placeholder="Kullanıcı Adı">
    <input type="password" id="reg-p1" placeholder="Şifre">
    <input type="email" id="reg-mail" placeholder="E-Posta (Doğrulama İçin)">
    <select id="reg-sch"></select>
    <input type="text" id="reg-sub" list="sube-listesi" placeholder="Şube">
    <button class="btn" onclick="doRegister()">Kayıt Ol ve Kod Gönder</button>
</div>

<div class="screen" id="scr-app" style="padding:0;">
    <div class="scroll" style="padding:20px;">
        <div id="v-home">
            <div class="card" style="text-align:center;">
                <img id="my-img" class="p-img" src="">
                <h2 id="my-name">---</h2>
                <div id="my-rank-area"></div>
                <div id="my-sch-name" style="color:var(--p); font-weight:bold;"></div>
                <small id="my-loc">---</small>
            </div>
            <h4>📌 Duyurular</h4>
            <div id="hw-list"></div>
        </div>
        
        <div id="v-forum" style="display:none;">
            <div class="card"><textarea id="f-in" placeholder="Bir şeyler yaz..."></textarea><button class="btn" onclick="sendF()">Paylaş</button></div>
            <div id="forum-list"></div>
        </div>

        <div id="v-msg" style="display:none;">
            <div id="msg-list-view"><h3>💬 Mesajlar</h3><div id="chats-container"></div></div>
            <div id="chat-detail-view" style="display:none;">
                <button class="btn" style="width:auto; background:#666;" onclick="closeChat()">⬅ Geri</button>
                <div id="chat-messages" style="height:300px; overflow:auto; display:flex; flex-direction:column; background:#fff; padding:10px; border-radius:8px; margin:10px 0;"></div>
                <div style="display:flex; gap:5px;"><input type="text" id="m-in"><button class="btn" style="width:50px;" onclick="sendM()">➤</button></div>
            </div>
        </div>

        <div id="v-users" style="display:none;"><h3>👥 Kişiler</h3><div id="main-user-list"></div></div>

        <div id="v-set" style="display:none;">
            <div class="card">
                <h4>PP Değiştir</h4>
                <input type="file" id="set-file" accept="image/*">
                <button class="btn" onclick="uploadImg()">Güncelle</button>
            </div>
            <div class="card" id="update-area">
                <h4>📥 Güncellemeler</h4>
                <div id="latest-update-info"><small>Güncel sürümdesiniz.</small></div>
            </div>
            <button class="btn" style="background:red" onclick="location.reload()">Çıkış</button>
        </div>
    </div>
    
    <nav class="navbar">
        <div class="nav-item active" onclick="setV('home')">🏠</div>
        <div class="nav-item" onclick="setV('forum')">🌐</div>
        <div class="nav-item" onclick="setV('msg')">💬</div>
        <div class="nav-item" onclick="setV('users')">👥</div>
        <div class="nav-item" onclick="setV('set')">⚙️</div>
    </nav>
</div>

<script>
    // Şubeler Jeneratörü
    const hrf = "ABCDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
    let opts = ""; for(let i=1; i<=12; i++) for(let h of hrf) opts += `<option value="${i}-${h}">`;
    document.getElementById('sube-listesi').innerHTML = opts;

    // Firebase Ayarları
    const firebaseConfig = {
        apiKey: "AIzaSyBduE1m-WMXuCJyWSu3IqZT_da1CbYvTV8",
        databaseURL: "https://okulumuz-ea041-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "okulumuz-ea041",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    emailjs.init("bgyhgWde8icqWQ5gB");

    let me = null; let selectedU = null; let activeChat = null;

    // Bildirim İzni
    if (Notification.permission !== "granted") Notification.requestPermission();

    // Navigasyon
    function nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function setV(v) {
        ["home","forum","msg","users","set"].forEach(x=>document.getElementById('v-'+x).style.display = x===v?'block':'none');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
    }
    function closeModals() { document.querySelectorAll('.modal, .overlay').forEach(e=>e.style.display="none"); }

    // Giriş
    function doLogin() {
        const u = document.getElementById('login-u').value.trim().toLowerCase();
        const p = document.getElementById('login-p').value;
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                if(d.banUntil && d.banUntil > Date.now()) return alert("Banlısın!");
                me = d;
                document.getElementById('adm-gate').style.display="block";
                if(me.verified) { nav('scr-app'); sync(); } 
                else { nav('scr-lock'); document.getElementById('verify-info').innerText = me.mail + " adresine kod gitmişti."; }
            } else alert("Hata!");
        });
    }

    // Kayıt & E-Posta
    async function doRegister() {
        const u = document.getElementById('reg-u').value.trim().toLowerCase();
        const mail = document.getElementById('reg-mail').value;
        const pin = Math.floor(1000 + Math.random() * 9000);
        if(!u || !mail) return alert("Eksik bilgi!");

        const userData = {
            name: u, pass: document.getElementById('reg-p1').value, mail: mail,
            school: document.getElementById('reg-sch').value, sub: document.getElementById('reg-sub').value.toUpperCase(),
            rank: "Öğrenci", rColor: "#2563eb", stars: 0, verified: false, pin: pin, img: "", banUntil: 0
        };

        db.ref('users/'+u).set(userData).then(() => {
            emailjs.send("service_id", "template_id", { to_email: mail, message: pin })
            .then(() => {
                alert("Kod Gönderildi!");
                me = userData;
                nav('scr-lock');
            });
        });
    }

    // Veri Senkronizasyonu
    function sync() {
        document.getElementById('my-name').innerText = me.name.toUpperCase();
        document.getElementById('my-sch-name').innerText = "🏫 " + me.school;
        let st = ""; for(let i=0; i<me.stars; i++) st += "⭐";
        document.getElementById('my-rank-area').innerHTML = `<span class="badge" style="background:${me.rColor}">${st} ${me.rank}</span>`;
        document.getElementById('my-img').src = me.img || 'https://via.placeholder.com/150';

        // Mesaj Bildirimleri
        db.ref('chats').on('child_changed', s => {
            const last = Object.values(s.val()).pop();
            if(last.from !== me.name && s.key.includes(me.name) && activeChat !== last.from) {
                if(Notification.permission === "granted") new Notification("Mesaj: "+last.from, {body: last.msg});
            }
        });

        // Güncelleme Takibi
        db.ref('updates').limitToLast(1).on('value', s => {
            const upArea = document.getElementById('latest-update-info');
            s.forEach(u => {
                const data = u.val();
                upArea.innerHTML = `<div class="update-banner"><b>Yeni Sürüm: ${data.ver}</b><br><small>${data.note}</small><br><a href="${data.url}" target="_blank" class="btn" style="display:block; background:#10b981; text-align:center; text-decoration:none;">İNDİR</a></div>`;
                if(Notification.permission === "granted" && localStorage.getItem('last_up') !== u.key) {
                    new Notification("🚀 Güncelleme Mevcut!", {body: data.ver + " yayınlandı."});
                    localStorage.setItem('last_up', u.key);
                }
            });
        });

        // Listeleri Doldur
        db.ref('users').on('value', s => {
            const al = document.getElementById('adm-user-list'); const ml = document.getElementById('main-user-list'); const cl = document.getElementById('chats-container');
            al.innerHTML = ""; ml.innerHTML = ""; cl.innerHTML = "";
            s.forEach(u => {
                const ud = u.val();
                al.innerHTML += `<div class="card" onclick="openAdminGui('${u.key}')">👤 ${u.key}</div>`;
                if(u.key !== me.name) {
                    ml.innerHTML += `<div class="card" onclick="openProfile('${u.key}')"><b>${u.key}</b></div>`;
                    cl.innerHTML += `<div class="card" onclick="openChat('${u.key}')"><b>${u.key}</b></div>`;
                }
            });
        });

        db.ref('forum').on('value', s => {
            const l = document.getElementById('forum-list'); l.innerHTML = "";
            s.forEach(f => {
                const d = f.val();
                l.innerHTML = `<div class="card"><b>${d.u} <span class="badge" style="background:${d.c}">${d.rank}</span></b><p>${d.m}</p></div>` + l.innerHTML;
            });
        });

        db.ref('homeworks').on('value', s => {
            const l = document.getElementById('hw-list'); l.innerHTML = "";
            s.forEach(h => { if(h.val().sch === me.school && h.val().sub === me.sub) l.innerHTML += `<div class="card"><b>📢:</b> ${h.val().text}</div>`; });
        });
    }

    // Fonksiyonlar
    function verifyPin() {
        db.ref('users/'+me.name).once('value', s => {
            if(s.val().pin.toString() === document.getElementById('p-code').value) {
                db.ref('users/'+me.name).update({verified:true});
                me.verified=true; nav('scr-app'); sync();
            } else alert("Yanlış PIN");
        });
    }

    function pushUpdate() {
        db.ref('updates').push({
            ver: document.getElementById('adm-up-ver').value,
            url: document.getElementById('adm-up-url').value,
            note: document.getElementById('adm-up-note').value
        }).then(()=>alert("Güncelleme Gönderildi!"));
    }

    function openChat(u) {
        activeChat = u; setV('msg'); document.getElementById('msg-list-view').style.display="none"; document.getElementById('chat-detail-view').style.display="block";
        const cid = [me.name, u].sort().join("_");
        db.ref('chats/'+cid).on('value', s => {
            const b = document.getElementById('chat-messages'); b.innerHTML = "";
            s.forEach(m => b.innerHTML += `<div class="chat-bubble ${m.val().from===me.name?'me':'them'}">${m.val().msg}</div>`);
            b.scrollTop = b.scrollHeight;
        });
    }
    
    function closeChat() { activeChat = null; document.getElementById('msg-list-view').style.display="block"; document.getElementById('chat-detail-view').style.display="none"; }
    function sendM() {
        const m = document.getElementById('m-in').value; if(!m) return;
        const cid = [me.name, activeChat].sort().join("_");
        db.ref('chats/'+cid).push({from:me.name, msg:m}); document.getElementById('m-in').value="";
    }

    function sendF() { db.ref('forum').push({u:me.name, m: document.getElementById('f-in').value, rank: me.rank, c: me.rColor, stars: me.stars}); document.getElementById('f-in').value=""; }
    function openAdminGui(u) { selectedU = u; document.getElementById('user-gui').style.display="block"; document.getElementById('gui-overlay').style.display="block"; }
    function closeModals() { document.querySelectorAll('.modal, .overlay').forEach(e=>e.style.display="none"); }
    function tryAdmin() { if(me.rank.includes("Admin") || prompt("Kod?")==="kodcplus") nav('scr-admin'); }
    function addSchool() { db.ref('schools').push({name: document.getElementById('adm-new-sch').value}); }
    function loadSchools(id) { db.ref('schools').once('value', s => { let el = document.getElementById(id); el.innerHTML = ""; s.forEach(o => el.innerHTML += `<option value="${o.val().name}">${o.val().name}</option>`); }); }
    function uploadImg() {
        const file = document.getElementById('set-file').files[0];
        const reader = new FileReader();
        reader.onloadend = function() { db.ref('users/'+me.name).update({ img: reader.result }); me.img = reader.result; sync(); }
        reader.readAsDataURL(file);
    }
    function saveGui(act) {
        const ref = db.ref('users/'+selectedU);
        if(act==='delete') ref.remove();
        else if(act==='ban') ref.update({banUntil: Date.now() + (document.getElementById('gui-ban-h').value * 3600000)});
        else ref.update({rank: document.getElementById('gui-rank').value, rColor: document.getElementById('gui-color').value, stars: parseInt(document.getElementById('gui-stars').value)});
        closeModals();
    }
    function openProfile(u) {
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            document.getElementById('p-gui-img').src = d.img || 'https://via.placeholder.com/150';
            document.getElementById('p-gui-name').innerText = u;
            document.getElementById('p-gui-sch').innerText = d.school;
            document.getElementById('profile-gui').style.display="block"; document.getElementById('gui-overlay').style.display="block";
        });
    }
</script>
</body>
</html>
