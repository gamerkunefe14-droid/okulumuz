<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okulumuz OS V10.8 - Mail Verified</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f3f4f6; --t: #1f2937; --card: #ffffff; }
        .theme-dark { --p: #60a5fa; --bg: #0f172a; --t: #f1f5f9; --card: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 20px; flex-direction: column; position: absolute; width: 100%; top:0; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 10px; background: var(--card); color: var(--t); }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); border-top: 1px solid #ddd; display: flex; z-index: 100; }
        .nav-item { flex: 1; text-align: center; opacity: 0.5; cursor: pointer; font-size: 11px; padding-top: 15px; }
        .nav-item.active { opacity: 1; color: var(--p); font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding-bottom: 80px; max-width: 500px; margin: 0 auto; width: 100%; }
        .p-frame { position: relative; width: 90px; height: 90px; margin: 0 auto 10px; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); }
    </style>
</head>
<body class="theme-blue">

<div class="screen" id="scr-verify">
    <div style="text-align:center; margin-top:50px;">
        <div style="font-size:60px;">📧</div>
        <h2>E-Postanı Doğrula</h2>
        <p style="padding:20px;">Uygulamaya girmek için mailine gelen bağlantıya tıklaman gerekiyor. (Gereksiz/Spam klasörünü kontrol et!)</p>
        <div class="card">
            <p id="verify-email-text">---</p>
        </div>
        <button class="btn" onclick="checkVerification()">Doğruladım, Giriş Yap</button>
        <button class="btn" style="background:#10b981;" onclick="sendVerifyEmail()">Tekrar Kod Gönder</button>
        <button class="btn" style="background:#666;" onclick="location.reload()">Çıkış Yap</button>
    </div>
</div>

<div class="screen active" id="scr-land">
    <div style="text-align:center; margin-top:100px;"><h1>Okulumuz OS</h1><p>V10.8 - Güvenlik Güncellemesi</p></div>
    <div style="margin-top:auto; padding-bottom:80px;"><button class="btn" onclick="nav('scr-reg')">Kayıt Ol</button><button class="btn" style="background:none; color:var(--p); border:2px solid var(--p);" onclick="nav('scr-log')">Giriş Yap</button></div>
</div>

<div class="screen" id="scr-reg">
    <h3>Yeni Hesap</h3>
    <input type="text" id="r-user" placeholder="Kullanıcı Adı (Küçük harf)">
    <input type="email" id="r-mail" placeholder="Okul Maillini Yaz">
    <input type="password" id="r-pass" placeholder="Şifre">
    <button class="btn" onclick="doRegister()">Kayıt Ol ve Doğrula</button>
    <button class="btn" style="background:#666" onclick="nav('scr-land')">Geri</button>
</div>

<div class="screen" id="scr-log">
    <h3>Giriş Yap</h3>
    <input type="email" id="l-mail" placeholder="E-posta">
    <input type="password" id="l-pass" placeholder="Şifre">
    <button class="btn" onclick="doLogin()">Giriş</button>
    <button class="btn" style="background:#666" onclick="nav('scr-land')">Geri</button>
</div>

<div class="screen" id="scr-app" style="padding:0;">
    <div class="scroll" style="padding:20px;">
        <div id="v-home">
            <div class="card" style="text-align:center;">
                <div class="p-frame"><img id="my-p-img" class="p-img" src="https://via.placeholder.com/150"></div>
                <h2 id="p-name">---</h2>
                <div id="p-badge" style="font-size:12px; font-weight:bold;">---</div>
            </div>
            <h4>📌 Duyurular</h4><div id="hw-list"></div>
        </div>
        </div>
    <nav class="navbar">
        <div class="nav-item" onclick="setV('msg')">💬 Mesaj</div>
        <div class="nav-item" onclick="setV('forum')">🌐 Forum</div>
        <div class="nav-item active" onclick="setV('home')">🏠 Ev</div>
        <div class="nav-item" onclick="setV('users')">👥 Kişiler</div>
        <div class="nav-item" onclick="setV('set')">⚙️ Ayar</div>
    </nav>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBduE1m-WMXuCJyWSu3IqZT_da1CbYvTV8",
        authDomain: "okulumuz-ea041.firebaseapp.com",
        databaseURL: "https://okulumuz-ea041-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "okulumuz-ea041",
        storageBucket: "okulumuz-ea041.appspot.com",
        messagingSenderId: "341438740966",
        appId: "1:341438740966:web:f442348eea4239619afe27"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth();
    const db = firebase.database();
    let me = null;

    function nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // KAYIT OLMA
    async function doRegister() {
        const u = document.getElementById('r-user').value.trim().toLowerCase();
        const e = document.getElementById('r-mail').value.trim();
        const p = document.getElementById('r-pass').value;
        
        try {
            const res = await auth.createUserWithEmailAndPassword(e, p);
            await res.user.sendEmailVerification();
            // Veritabanına kullanıcıyı kaydet
            await db.ref('users/' + u).set({
                name: u, email: e, rank: "Öğrenci", stars: 0, img: "", banUntil: 0
            });
            document.getElementById('verify-email-text').innerText = e;
            nav('scr-verify');
            alert("Doğrulama maili gönderildi!");
        } catch (err) { alert("Hata: " + err.message); }
    }

    // GİRİŞ YAPMA
    async function doLogin() {
        const e = document.getElementById('l-mail').value.trim();
        const p = document.getElementById('l-pass').value;

        try {
            const res = await auth.signInWithEmailAndPassword(e, p);
            if (!res.user.emailVerified) {
                document.getElementById('verify-email-text').innerText = e;
                nav('scr-verify');
            } else {
                // Doğrulanmışsa kullanıcı verisini çek ve gir
                loadUserData(res.user.email);
            }
        } catch (err) { alert("Giriş başarısız: " + err.message); }
    }

    function checkVerification() {
        auth.currentUser.reload().then(() => {
            if (auth.currentUser.emailVerified) {
                alert("Başarıyla doğrulandı!");
                loadUserData(auth.currentUser.email);
            } else {
                alert("Hala doğrulanmamış. Lütfen mailindeki linke tıkla.");
            }
        });
    }

    function sendVerifyEmail() {
        auth.currentUser.sendEmailVerification().then(() => alert("Kod tekrar gönderildi."));
    }

    function loadUserData(email) {
        db.ref('users').orderByChild('email').equalTo(email).once('value', s => {
            s.forEach(u => {
                me = u.val();
                nav('scr-app');
                sync();
            });
        });
    }

    // ÖNEMLİ: Uygulama açıldığında eski kullanıcıları kontrol et
    auth.onAuthStateChanged(user => {
        if (user) {
            if (user.emailVerified) loadUserData(user.email);
            else {
                document.getElementById('verify-email-text').innerText = user.email;
                nav('scr-verify');
            }
        }
    });

    // ... (Sync ve diğer fonksiyonlar V10.7.3 ile aynı şekilde devam eder)
    function sync() {
        document.getElementById('p-name').innerText = me.name.toUpperCase();
        document.getElementById('p-badge').innerText = me.rank;
        document.getElementById('my-p-img').src = me.img || 'https://via.placeholder.com/150';
    }
</script>
</body>
</html>
