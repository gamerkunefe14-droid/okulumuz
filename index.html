<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okulumuz OS V11.1 - EmailJS Full</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --p: #2563eb; --bg: #f3f4f6; --t: #1f2937; --card: #ffffff; }
        .theme-dark { --p: #60a5fa; --bg: #0f172a; --t: #f1f5f9; --card: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 20px; flex-direction: column; position: absolute; width: 100%; top:0; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; position: relative; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 10px; background: var(--card); color: var(--t); outline: none; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); border-top: 1px solid #ddd; display: flex; z-index: 100; }
        .nav-item { flex: 1; text-align: center; opacity: 0.5; cursor: pointer; font-size: 11px; padding-top: 20px; }
        .nav-item.active { opacity: 1; color: var(--p); font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding-bottom: 80px; max-width: 500px; margin: 0 auto; width: 100%; }
        .p-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); }
    </style>
</head>
<body class="theme-blue">

<div class="screen" id="scr-lock">
    <div style="text-align:center; margin-top:50px;">
        <div style="font-size:50px;">📧</div>
        <h2>E-Posta Onayı</h2>
        <p id="lock-status" style="padding:15px; font-size:14px;">Uygulamaya devam etmek için kod almalısın.</p>
        
        <div id="step-email">
            <input type="email" id="l-email" placeholder="Okul E-postanı Yaz">
            <button class="btn" id="send-btn" onclick="sendMailWithPin()">Kodu Mail Gönder</button>
        </div>

        <div id="step-pin" style="display:none;">
            <input type="text" id="p-code" maxlength="4" style="text-align:center; font-size:24px; letter-spacing:8px;" placeholder="0000">
            <button class="btn" onclick="verifyPin()">Kodu Doğrula</button>
            <p onclick="location.reload()" style="cursor:pointer; margin-top:10px; font-size:12px; opacity:0.6;">Maili Yanlış mı Yazdın?</p>
        </div>
    </div>
</div>

<div class="screen active" id="scr-log">
    <div style="text-align:center; margin-top:80px;"><h1>Okulumuz OS</h1><p>Giriş Yap</p></div>
    <div style="margin-top:40px;">
        <input type="text" id="login-u" placeholder="Kullanıcı Adı">
        <input type="password" id="login-p" placeholder="Şifre">
        <button class="btn" onclick="doLogin()">Giriş</button>
        <button class="btn" style="background:none; color:var(--p);" onclick="nav('scr-reg')">Hesap Oluştur</button>
    </div>
</div>

<div class="screen" id="scr-reg">
    <h3>Yeni Kayıt</h3>
    <input type="text" id="reg-u" placeholder="Kullanıcı Adı">
    <input type="password" id="reg-p" placeholder="Şifre">
    <button class="btn" onclick="doRegister()">Kayıt Ol</button>
    <button class="btn" style="background:#666" onclick="nav('scr-log')">Geri</button>
</div>

<div class="screen" id="scr-app" style="padding:0;">
    <div class="scroll" style="padding:20px;">
        <div id="v-home">
            <div class="card" style="text-align:center;">
                <img id="my-img" class="p-img" src="https://via.placeholder.com/150">
                <h2 id="my-name">---</h2>
                <p id="my-rank">---</p>
            </div>
            <h4>📌 Okul Forumu</h4>
            <div id="forum-list"></div>
        </div>
        </div>
    <nav class="navbar">
        <div class="nav-item active" onclick="setV('home')">🏠 Ev</div>
        <div class="nav-item" onclick="setV('set')">⚙️ Ayarlar</div>
    </nav>
</div>

<script>
    // --- 🔑 AYARLAR (BURAYI DOLDURMAN ŞART!) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBduE1m-WMXuCJyWSu3IqZT_da1CbYvTV8",
        databaseURL: "https://okulumuz-ea041-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "okulumuz-ea041",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // EMAILJS ANAHTARLARIN (EmailJS hesabından alıp buraya yapıştır)
    const EJS_SERVICE = "YOUR_SERVICE_ID"; 
    const EJS_TEMPLATE = "YOUR_TEMPLATE_ID";
    const EJS_PUBLIC = "YOUR_PUBLIC_KEY";

    emailjs.init(EJS_PUBLIC);

    let me = null;

    function nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // GİRİŞ / KAYIT
    function doRegister() {
        const u = document.getElementById('reg-u').value.trim().toLowerCase();
        const p = document.getElementById('reg-p').value;
        if(!u || !p) return alert("Boş bırakma kanka!");
        db.ref('users/'+u).set({ name:u, pass:p, rank:"Öğrenci", verified:false, img:"" }).then(()=>nav('scr-log'));
    }

    function doLogin() {
        const u = document.getElementById('login-u').value.trim().toLowerCase();
        const p = document.getElementById('login-p').value;
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                me = d;
                if(me.verified) { nav('scr-app'); sync(); } else nav('scr-lock');
            } else alert("Hatalı Giriş!");
        });
    }

    // --- 📧 EMAILJS İLE MAİL GÖNDERME ---
    async function sendMailWithPin() {
        const mail = document.getElementById('l-email').value.trim();
        if(!mail.includes("@")) return alert("Doğru dürüst mail yaz kanka!");
        
        const pin = Math.floor(1000 + Math.random() * 9000);
        const sendBtn = document.getElementById('send-btn');
        sendBtn.disabled = true;
        sendBtn.innerText = "Gönderiliyor...";

        try {
            // Veritabanına PIN kaydet
            await db.ref('users/'+me.name).update({ email: mail, temp_pin: pin });

            // EmailJS ile gönder
            await emailjs.send(EJS_SERVICE, EJS_TEMPLATE, {
                to_name: me.name,
                to_email: mail,
                message: pin // Şablonunda {{message}} kısmına bu kod gelecek
            });

            alert("Kod mailine fişeklendi!");
            document.getElementById('step-email').style.display = "none";
            document.getElementById('step-pin').style.display = "block";
        } catch (err) {
            alert("Hata oluştu kanka: " + JSON.stringify(err));
            sendBtn.disabled = false;
            sendBtn.innerText = "Tekrar Dene";
        }
    }

    function verifyPin() {
        const pinIn = document.getElementById('p-code').value;
        db.ref('users/'+me.name).once('value', s => {
            if(s.val().temp_pin.toString() === pinIn) {
                db.ref('users/'+me.name).update({ verified: true });
                me.verified = true;
                nav('scr-app');
                sync();
            } else alert("Kod yanlış kanka, patladın!");
        });
    }

    function sync() {
        document.getElementById('my-name').innerText = me.name.toUpperCase();
        document.getElementById('my-rank').innerText = me.rank;
        document.getElementById('my-img').src = me.img || 'https://via.placeholder.com/150';
    }
</script>
</body>
</html>
