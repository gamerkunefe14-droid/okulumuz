<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okulumuz OS V10.7</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f3f4f6; --t: #1f2937; --card: #ffffff; }
        .theme-dark { --p: #60a5fa; --bg: #0f172a; --t: #f1f5f9; --card: #1e293b; }
        .theme-green { --p: #10b981; --bg: #f0fdf4; --t: #064e3b; --card: #ffffff; }
        .theme-red { --p: #ef4444; --bg: #fef2f2; --t: #7f1d1d; --card: #ffffff; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 20px; flex-direction: column; position: absolute; width: 100%; top:0; background: var(--bg); }
        .screen.active { display: flex; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 10px; outline: none; background: var(--card); color: var(--t); }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { text-align: center; opacity: 0.5; flex: 1; cursor: pointer; font-size: 11px; }
        .nav-item.active { opacity: 1; color: var(--p); font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding-bottom: 80px; max-width: 500px; margin: 0 auto; width: 100%; }

        /* Profil Stilleri */
        .p-frame { position: relative; width: 90px; height: 90px; margin: 0 auto 10px; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); background: #eee; }
        .admin-star { position: absolute; top: -10px; right: -5px; font-size: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); display: none; }
        
        .u-stars { color: #f59e0b; font-size: 10px; }
        .u-name { font-weight: bold; font-size: 16px; }
        .u-rank { font-size: 10px; font-weight: 800; text-transform: uppercase; }

        /* Kullanıcı GUI */
        .user-gui { position: fixed; inset: 0; background: var(--bg); z-index: 3000; padding: 20px; display: none; flex-direction: column; align-items: center; }
        .user-gui.active { display: flex; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .user-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--p); }

        .del-msg { position: absolute; top: 10px; right: 10px; color: #ef4444; cursor: pointer; font-size: 18px; }
        #ban-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); color: white; z-index: 9999; display: none; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div id="ban-overlay"><div><h1>🚫 ERİŞİM ENGELLENDİ</h1><p id="ban-msg"></p><br><button class="btn" onclick="location.reload()">Tekrar Dene</button></div></div>

<div id="gui-user" class="user-gui">
    <div style="width:100%; display:flex; justify-content:space-between;"><span></span><button onclick="document.getElementById('gui-user').classList.remove('active')" style="border:none; background:none; font-size:28px;">✖</button></div>
    <div class="p-frame" style="margin-top:20px;">
        <div id="ug-admin-star" class="admin-star">⭐</div>
        <img id="ug-img" class="p-img" src="https://via.placeholder.com/150">
    </div>
    <h2 id="ug-name">YÜKLENİYOR...</h2>
    <div id="ug-stars" class="u-stars"></div>
    <div id="ug-rank" class="u-rank" style="margin-bottom:10px;">---</div>
    <div id="ug-followers" style="font-weight:bold; color:var(--p); margin-bottom:20px;">0 Takipçi</div>
    <button class="btn" id="ug-follow-btn" onclick="toggleFollow()">Takip Et</button>
    <button class="btn" style="background:#10b981;" id="ug-msg-btn">Mesaj Gönder</button>
</div>

<div class="screen active" id="scr-land">
    <div style="text-align:center; margin-top:80px;"><h1>Okulumuz OS</h1><p>V10.7 Social Update</p></div>
    <div style="margin-top:auto; padding-bottom:50px;"><button class="btn" onclick="nav('scr-reg')">Kaydol</button><button class="btn" style="background:none; color:var(--p); border:2px solid var(--p);" onclick="nav('scr-log')">Giriş Yap</button></div>
</div>

<div class="screen" id="scr-reg">
    <h3>Kaydol</h3>
    <input type="text" id="r-user" placeholder="Kullanıcı Adı"><input type="email" id="r-mail" placeholder="E-posta">
    <div style="display:flex; gap:10px;">
        <select id="r-level"><script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}. Sınıf</option>`);</script></select>
        <select id="r-sub"><script>for(let i=65;i<=90;i++) document.write(`<option value="${String.fromCharCode(i)}">${String.fromCharCode(i)}</option>`);</script></select>
    </div>
    <input type="password" id="r-pass" placeholder="Şifre"><button class="btn" onclick="doRegister()">Kayıt Ol</button><button class="btn" style="background:#666" onclick="nav('scr-land')">Geri</button>
</div>

<div class="screen" id="scr-log"><h3>Giriş</h3><input type="text" id="l-user" placeholder="Kullanıcı Adı"><input type="password" id="l-pass" placeholder="Şifre"><button class="btn" onclick="doLogin()">Giriş</button></div>

<div class="screen" id="scr-app">
    <div class="scroll">
        <div id="v-home">
            <div class="card" style="text-align:center;">
                <div class="p-frame">
                    <div id="my-admin-star" class="admin-star">⭐</div>
                    <img id="my-p-img" class="p-img" src="https://via.placeholder.com/150">
                </div>
                <h2 id="p-name">---</h2>
                <div id="p-stars" class="u-stars"></div>
                <div id="p-badge" class="u-rank">---</div>
                <div onclick="checkAdmin()" style="margin-top:10px; font-size:11px; cursor:pointer; opacity:0.5;">🛡️ YÖNETİM</div>
            </div>
            <h4>📌 Duyurular</h4><div id="hw-list"></div>
        </div>

        <div id="v-users" style="display:none;">
            <input type="text" id="user-search" placeholder="Kullanıcı ara..." oninput="searchUsers(this.value)">
            <div id="user-list"></div>
        </div>

        <div id="v-forum" style="display:none;"><div class="card"><textarea id="f-in" placeholder="Okula bir şeyler yaz..."></textarea><button class="btn" onclick="sendF()">Paylaş</button></div><div id="f-list"></div></div>
        <div id="v-msg" style="display:none;"><div class="card"><input type="text" id="m-to" placeholder="Alıcı..."><textarea id="m-in" placeholder="Mesajın..."></textarea><button class="btn" onclick="sendM()">Gönder</button></div><div id="m-list"></div></div>

        <div id="v-set" style="display:none;">
            <div class="card"><h4>Profil Resmi Yükle</h4><input type="file" id="p-upload" accept="image/*" onchange="uploadImg()"><p style="font-size:10px; color:#666; margin-top:5px;">Resim seçince otomatik güncellenir.</p></div>
            <div class="card"><h4>Tema</h4><select onchange="changeTheme(this.value)"><option value="theme-blue">Mavi</option><option value="theme-dark">Karanlık</option><option value="theme-green">Yeşil</option><option value="theme-red">Kırmızı</option></select></div>
            <div class="card"><h4>Hesap</h4><input type="email" id="s-mail" placeholder="E-posta"><input type="password" id="s-pass" placeholder="Yeni Şifre"><button class="btn" onclick="updateAcc()">Kaydet</button></div>
        </div>
    </div>
    
    <nav class="navbar">
        <div class="nav-item" onclick="setV('msg')">💬 Mesaj</div>
        <div class="nav-item" onclick="setV('forum')">🌐 Forum</div>
        <div class="nav-item active" onclick="setV('home')">🏠 Ev</div>
        <div class="nav-item" onclick="setV('users')">👥 Kişiler</div>
        <div class="nav-item" onclick="setV('set')">⚙️ Ayar</div>
    </nav>
</div>

<div class="admin-layer" id="gui-adm">
    <div style="display:flex; justify-content:space-between;"><h2>Yönetim</h2><button onclick="document.getElementById('gui-adm').classList.remove('active')" style="border:none; background:none; font-size:24px;">✖</button></div>
    <div class="card"><h4>Kullanıcılar</h4><div id="adm-u-list"></div></div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyBduE1m-WMXuCJyWSu3IqZT_da1CbYvTV8",
        authDomain: "okulumuz-ea041.firebaseapp.com",
        databaseURL: "https://okulumuz-ea041-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "okulumuz-ea041",
        storageBucket: "okulumuz-ea041.appspot.com",
        messagingSenderId: "341438740966",
        appId: "1:341438740966:web:f442348eea4239619afe27"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let me = null;
    let viewingUser = null;

    function nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function setV(v) {
        ["home","forum","msg","set","users"].forEach(x=>document.getElementById('v-'+x).style.display = x===v?'block':'none');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
    }

    function doRegister() {
        const u = document.getElementById('r-user').value.trim().toLowerCase();
        const e = document.getElementById('r-mail').value.trim();
        const p = document.getElementById('r-pass').value;
        const cl = document.getElementById('r-level').value + "-" + document.getElementById('r-sub').value;
        if(!u || !p) return alert("Eksik bilgi!");
        db.ref('users/'+u).get().then(s => {
            if(s.exists()) alert("Alınmış!");
            else db.ref('users/'+u).set({ name:u, email:e, class:cl, pass:p, rank:"Öğrenci", stars:0, rankColor:"#666", img:"" }).then(()=>nav('scr-log'));
        });
    }

    function doLogin() {
        const u = document.getElementById('l-user').value.trim().toLowerCase();
        const p = document.getElementById('l-pass').value;
        db.ref('users/'+u).on('value', snap => {
            const d = snap.val();
            if(d && d.pass === p) {
                if(d.banUntil > Date.now()) return alert("Banlısın!");
                me = d;
                nav('scr-app'); sync();
            } else alert("Hata!");
        });
    }

    function searchUsers(q) {
        db.ref('users').once('value', s => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            s.forEach(u => {
                const d = u.val();
                if(d.name.includes(q.toLowerCase()) && d.name !== me.name) {
                    list.innerHTML += `<div class="user-item" onclick="openUserGui('${d.name}')"><img src="${d.img || 'https://via.placeholder.com/150'}"><div><b>${d.name}</b><br><small>${d.rank}</small></div></div>`;
                }
            });
        });
    }

    function openUserGui(name) {
        db.ref('users/'+name).on('value', s => {
            const d = s.val(); viewingUser = d;
            document.getElementById('ug-name').innerText = d.name.toUpperCase();
            document.getElementById('ug-img').src = d.img || 'https://via.placeholder.com/150';
            document.getElementById('ug-rank').innerText = d.rank;
            document.getElementById('ug-stars').innerText = "★".repeat(d.stars || 0);
            db.ref('follows/'+name).on('value', fs => {
                let c = 0; let adm = false;
                fs.forEach(f => { c++; if(f.val().isAdmin) adm = true; });
                document.getElementById('ug-followers').innerText = c + " Takipçi";
                document.getElementById('ug-admin-star').style.display = adm ? "block" : "none";
            });
            document.getElementById('ug-msg-btn').onclick = () => { setV('msg'); document.getElementById('m-to').value = d.name; document.getElementById('gui-user').classList.remove('active'); };
            document.getElementById('gui-user').classList.add('active');
        });
    }

    function toggleFollow() {
        const isAdmin = me.rank && me.rank.includes("Admin");
        db.ref('follows/'+viewingUser.name+'/'+me.name).set({ from: me.name, isAdmin: isAdmin });
        alert("Takip Edildi!");
    }

    function uploadImg() {
        const file = document.getElementById('p-upload').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            db.ref('users/'+me.name).update({ img: reader.result });
            alert("Resim güncellendi!");
        };
        if(file) reader.readAsDataURL(file);
    }

    function sync() {
        document.getElementById('p-name').innerText = me.name.toUpperCase();
        document.getElementById('p-badge').innerText = me.rank;
        document.getElementById('my-p-img').src = me.img || 'https://via.placeholder.com/150';
        document.getElementById('p-stars').innerText = "★".repeat(me.stars || 0);

        db.ref('follows/'+me.name).on('value', fs => {
            let adm = false; fs.forEach(f => { if(f.val().isAdmin) adm = true; });
            document.getElementById('my-admin-star').style.display = adm ? "block" : "none";
        });

        // Forum, Duyuru ve Mesaj senkronizasyonu (Önceki sürümlerle aynı)
        db.ref('forum').on('value', s => {
            const l = document.getElementById('f-list'); l.innerHTML = "";
            const canDel = me.rank && (me.rank.includes("Admin") || me.rank.includes("Moderatör"));
            s.forEach(c => {
                const d = c.val(); let del = canDel ? `<span class="del-msg" onclick="db.ref('forum/${c.key}').remove()">🗑️</span>` : '';
                l.innerHTML = `<div class="card">${del}<b>${d.u}</b> <small>(${d.class})</small><br><small style="color:${d.rankColor}">${d.rank}</small><p>${d.m}</p></div>` + l.innerHTML;
            });
        });

        db.ref('homework').on('value', s => {
            const l = document.getElementById('hw-list'); l.innerHTML = "";
            s.forEach(c => { l.innerHTML += `<div class="card"><b>${c.val().t}</b><p>${c.val().d}</p></div>`; });
        });

        db.ref('p_msgs/'+me.name).on('value', s => {
            const l = document.getElementById('m-list'); l.innerHTML = "";
            s.forEach(c => { l.innerHTML = `<div class="card"><b>${c.val().from}:</b><p>${c.val().msg}</p></div>` + l.innerHTML; });
        });
    }

    function checkAdmin() {
        if(me.rank && me.rank.includes("Admin")) document.getElementById('gui-adm').classList.add('active');
        else if(prompt("KOD 1")==="kodcplusadminguiaccess" && prompt("KOD 2")==="kodckunefeaccountadminaccess") document.getElementById('gui-adm').classList.add('active');
        else alert("Yetki yok!");
    }

    function sendF() { const m = document.getElementById('f-in').value; if(m) { db.ref('forum').push({ u:me.name, m:m, rank:me.rank, class:me.class, rankColor:me.rankColor }); document.getElementById('f-in').value=""; } }
    function sendM() { const t = document.getElementById('m-to').value.trim().toLowerCase(); const m = document.getElementById('m-in').value; if(t && m) { db.ref('p_msgs/'+t).push({ from:me.name, msg:m }); alert("Gönderildi!"); document.getElementById('m-in').value=""; } }
    function changeTheme(t) { document.body.className = t; }
    function updateAcc() { const m = document.getElementById('s-mail').value; const p = document.getElementById('s-pass').value; db.ref('users/'+me.name).update({ email:m, pass: p || me.pass }); alert("Güncellendi!"); }
</script>
</body>
</html>
