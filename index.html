<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okulumuz OS V18.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f3f4f6; --t: #1f2937; --card: #ffffff; }
        .theme-dark { --p: #60a5fa; --bg: #0f172a; --t: #f1f5f9; --card: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 20px; flex-direction: column; position: absolute; width: 100%; top:0; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 10px; background: var(--card); color: var(--t); }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--card); border-top: 1px solid #ddd; display: flex; z-index: 100; }
        .nav-item { flex: 1; text-align: center; opacity: 0.4; cursor: pointer; font-size: 11px; padding-top: 15px; }
        .nav-item.active { opacity: 1; color: var(--p); font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding-bottom: 80px; max-width: 500px; margin: 0 auto; width: 100%; }
        .badge { font-size: 10px; padding: 2px 6px; color: white; border-radius: 4px; font-weight: bold; }
        .admin-btn { position: fixed; top: 15px; right: 15px; background: #000; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 11px; z-index: 500; cursor: pointer; border:none; }
        .p-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--p); }
    </style>
</head>
<body class="theme-blue">

<button id="adm-gate" class="admin-btn" style="display:none;" onclick="tryAdmin()">👑 YÖNETİM</button>

<datalist id="sube-listesi"></datalist>

<div class="screen" id="scr-admin" style="z-index:3000;">
    <h3>👑 Yönetim Paneli</h3>
    <div class="scroll">
        <div class="card">
            <h4>👥 Kullanıcı Kontrolü</h4>
            <div id="adm-user-list" style="max-height:100px; overflow:auto; border:1px solid #ddd; margin-bottom:10px;"></div>
            <input type="text" id="adm-u-target" placeholder="Seçilen Kişi" readonly>
            <div style="display:flex; gap:5px;">
                <input type="text" id="adm-u-rank" placeholder="Unvan">
                <input type="color" id="adm-u-color" value="#2563eb" style="width:50px; height:45px;">
            </div>
            <input type="text" id="adm-u-sub" list="sube-listesi" placeholder="Şube Değiştir">
            <button class="btn" style="background:orange" onclick="updateUser()">Yetkileri Kaydet</button>
            <hr><br>
            <h4>⚖️ Ceza Sistemi</h4>
            <input type="number" id="ban-hours" placeholder="Kaç Saat? (Örn: 24)">
            <button class="btn" style="background:red" onclick="banUser()">Süreli Ban At</button>
            <button class="btn" style="background:green" onclick="unbanUser()">Cezayı İptal Et</button>
        </div>
        <button class="btn" style="background:#666" onclick="nav('scr-app')">Kapat</button>
    </div>
</div>

<div class="screen active" id="scr-log">
    <div style="text-align:center; margin-top:80px;"><h1>Okulumuz OS</h1></div>
    <input type="text" id="login-u" placeholder="Kullanıcı Adı" style="margin-top:40px;">
    <input type="password" id="login-p" placeholder="Şifre">
    <button class="btn" onclick="doLogin()">Giriş</button>
    <button class="btn" style="background:none; color:var(--p);" onclick="nav('scr-reg'); loadSchools('reg-sch');">Kayıt Ol</button>
</div>

<div class="screen" id="scr-reg">
    <h3>Yeni Kayıt</h3>
    <input type="text" id="reg-u" placeholder="Kullanıcı Adı">
    <input type="password" id="reg-p1" placeholder="Şifre">
    <input type="password" id="reg-p2" placeholder="Şifre Tekrar">
    <select id="reg-sch"></select>
    <input type="text" id="reg-sub" list="sube-listesi" placeholder="Sınıf-Şube Seç">
    <button class="btn" onclick="doRegister()">Tamamla</button>
</div>

<div class="screen" id="scr-app" style="padding:0;">
    <div class="scroll" style="padding:20px;">
        <div id="v-home">
            <div class="card" style="text-align:center;">
                <img id="my-img" class="p-img" src="">
                <h2 id="my-name">---</h2>
                <div id="my-rank-area"></div>
                <small id="my-loc">---</small>
            </div>
            <h4>📌 Duyurular</h4>
            <div id="hw-list"></div>
        </div>
        <div id="v-forum" style="display:none;"><div class="card"><textarea id="f-in" placeholder="Yaz..."></textarea><button class="btn" onclick="sendF()">Gönder</button></div><div id="forum-list"></div></div>
        <div id="v-msg" style="display:none;"><div class="card"><input type="text" id="m-to" placeholder="Kime?"><textarea id="m-in" placeholder="Mesaj..."></textarea><button class="btn" onclick="sendM()">Gönder</button></div><div id="m-list"></div></div>
        <div id="v-users" style="display:none;"><h3>👥 Kişiler</h3><div id="main-user-list"></div></div>
        <div id="v-set" style="display:none;"><div class="card"><input type="text" id="set-img" placeholder="Resim Linki"><button class="btn" onclick="saveSettings()">Kaydet</button></div><button class="btn" style="background:red" onclick="location.reload()">Çıkış</button></div>
    </div>
    <nav class="navbar">
        <div class="nav-item active" onclick="setV('home')">🏠</div>
        <div class="nav-item" onclick="setV('forum')">🌐</div>
        <div class="nav-item" onclick="setV('msg')">💬</div>
        <div class="nav-item" onclick="setV('users')">👥</div>
        <div class="nav-item" onclick="setV('set')">⚙️</div>
    </nav>
</div>

<script>
    // Şubeleri 1-A'dan 12-Z'ye oluştur
    const dl = document.getElementById('sube-listesi');
    const harfler = "ABCDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
    for(let i=1; i<=12; i++) {
        for(let h=0; h<harfler.length; h++) {
            dl.innerHTML += `<option value="${i}-${harfler[h]}">`;
        }
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBduE1m-WMXuCJyWSu3IqZT_da1CbYvTV8",
        databaseURL: "https://okulumuz-ea041-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "okulumuz-ea041",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = null;

    function nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function setV(v) {
        ["home","forum","msg","users","set"].forEach(x=>document.getElementById('v-'+x).style.display = x===v?'block':'none');
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function doLogin() {
        const u = document.getElementById('login-u').value.trim().toLowerCase();
        const p = document.getElementById('login-p').value;
        db.ref('users/'+u).once('value', s => {
            const d = s.val();
            if(d && d.pass === p) {
                // Ban Kontrolü
                if(d.banUntil && d.banUntil > Date.now()) {
                    let kalan = Math.ceil((d.banUntil - Date.now()) / 3600000);
                    return alert("Cezalısın! Kalan süre: " + kalan + " saat.");
                }
                me = d;
                document.getElementById('adm-gate').style.display = "block";
                nav('scr-app'); sync();
            } else alert("Hatalı giriş!");
        });
    }

    function doRegister() {
        const u = document.getElementById('reg-u').value.trim().toLowerCase();
        const p1 = document.getElementById('reg-p1').value;
        const sch = document.getElementById('reg-sch').value;
        const sub = document.getElementById('reg-sub').value.toUpperCase();
        db.ref('users/'+u).set({name:u, pass:p1, school:sch, sub, rank:"Öğrenci", rColor:"#2563eb", verified:true, img:"", banUntil:0}).then(()=>nav('scr-log'));
    }

    function sync() {
        document.getElementById('my-name').innerText = me.name.toUpperCase();
        document.getElementById('my-rank-area').innerHTML = `<span class="badge" style="background:${me.rColor}">${me.rank}</span>`;
        document.getElementById('my-loc').innerText = me.school + " / " + me.sub;
        document.getElementById('my-img').src = me.img || 'https://via.placeholder.com/150';

        db.ref('forum').on('value', s => {
            const l = document.getElementById('forum-list'); l.innerHTML = "";
            s.forEach(f => {
                const d = f.val();
                l.innerHTML = `<div class="card"><b>${d.u} <span class="badge" style="background:${d.c}">${d.rank}</span></b><p>${d.m}</p></div>` + l.innerHTML;
            });
        });

        db.ref('users').on('value', s => {
            const al = document.getElementById('adm-user-list'); al.innerHTML = "";
            const ml = document.getElementById('main-user-list'); ml.innerHTML = "";
            s.forEach(u => {
                al.innerHTML += `<div onclick="selectUser('${u.key}')" style="cursor:pointer; padding:5px; border-bottom:1px solid #eee;">${u.key}</div>`;
                ml.innerHTML += `<div class="card"><b>${u.key}</b> <span class="badge" style="background:${u.val().rColor}">${u.val().rank}</span></div>`;
            });
        });
    }

    // ADMİN FONKSİYONLARI
    function tryAdmin() { if(me.rank.toLowerCase().includes("admin") || prompt("Kod?") === "kodcplusadminguiaccess") nav('scr-admin'); }
    function selectUser(u) { document.getElementById('adm-u-target').value = u; }
    
    function updateUser() {
        const u = document.getElementById('adm-u-target').value;
        db.ref('users/'+u).update({ 
            rank: document.getElementById('adm-u-rank').value, 
            rColor: document.getElementById('adm-u-color').value,
            sub: document.getElementById('adm-u-sub').value.toUpperCase() 
        });
        alert("Güncellendi!");
    }

    function banUser() {
        const u = document.getElementById('adm-u-target').value;
        const h = document.getElementById('ban-hours').value;
        const bitis = Date.now() + (h * 3600000);
        db.ref('users/'+u).update({ banUntil: bitis });
        alert(u + " kişisi " + h + " saat banlandı!");
    }

    function unbanUser() {
        const u = document.getElementById('adm-u-target').value;
        db.ref('users/'+u).update({ banUntil: 0 });
        alert(u + " kişisinin cezası kaldırıldı!");
    }

    function loadSchools(id) {
        db.ref('schools').once('value', s => {
            const el = document.getElementById(id); el.innerHTML = '<option value="">Okul Seç</option>';
            s.forEach(o => el.innerHTML += `<option value="${o.val().name}">${o.val().name}</option>`);
        });
    }

    function saveSettings() { db.ref('users/'+me.name).update({ img: document.getElementById('set-img').value }); alert("Kaydedildi!"); sync(); }
    function sendF() { db.ref('forum').push({u:me.name, m: document.getElementById('f-in').value, rank: me.rank, c: me.rColor}); document.getElementById('f-in').value=""; }
    function sendM() { db.ref('messages/'+document.getElementById('m-to').value).push({from:me.name, msg: document.getElementById('m-in').value}); alert("Gitti!"); }
</script>
</body>
</html>
